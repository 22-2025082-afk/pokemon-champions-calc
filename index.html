<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions ダメージ計算機 Ver.1.0</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Pokémon Champions ダメージ計算機</h1>
    <p>Version 1.0</p>
</header>

<main class="container">

    <!-- 攻撃側 -->
    <section class="card">

        <h2>攻撃側</h2>

        <div class="form-group">
            <label>ポケモン</label>
            <input id="attackerPokemon"
                   list="pokemonList"
                   autocomplete="off"
                   placeholder="ポケモン名を入力">
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>タイプ1</label>
                <select id="attackerType1"></select>
            </div>

            <div class="form-group">
                <label>タイプ2</label>
                <select id="attackerType2"></select>
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>攻撃種族値</label>
                <input id="atkBase" type="number">
            </div>

            <div class="form-group">
                <label>特攻種族値</label>
                <input id="spaBase" type="number">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>攻撃能力ポイント</label>
                <input id="atkPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>特攻能力ポイント</label>
                <input id="spaPoint" type="number" value="0">
            </div>

        </div>

        <div class="form-group">
            <label>性格</label>
            <select id="attackerNature"></select>
        </div>

    </section>

    <!-- 防御側 -->
    <section class="card">

        <h2>防御側</h2>

        <div class="form-group">
            <label>ポケモン</label>
            <input id="defenderPokemon"
                   list="pokemonList"
                   autocomplete="off"
                   placeholder="ポケモン名を入力">
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>タイプ1</label>
                <select id="defenderType1"></select>
            </div>

            <div class="form-group">
                <label>タイプ2</label>
                <select id="defenderType2"></select>
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>HP種族値</label>
                <input id="hpBase" type="number">
            </div>

            <div class="form-group">
                <label>防御種族値</label>
                <input id="defBase" type="number">
            </div>

            <div class="form-group">
                <label>特防種族値</label>
                <input id="spdBase" type="number">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>HP能力ポイント</label>
                <input id="hpPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>防御能力ポイント</label>
                <input id="defPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>特防能力ポイント</label>
                <input id="spdPoint" type="number" value="0">
            </div>

        </div>

        <div class="form-group">
            <label>性格</label>
            <select id="defenderNature"></select>
        </div>

    </section>

    <!-- 技 -->
    <section class="card">

        <h2>技</h2>

        <div class="form-group">
            <label>技名</label>
            <input id="moveName"
                   list="moveList"
                   autocomplete="off"
                   placeholder="技名を入力">
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>タイプ</label>
                <select id="moveType"></select>
            </div>

            <div class="form-group">
                <label>分類</label>
                <select id="moveCategory">
                    <option value="physical">物理</option>
                    <option value="special">特殊</option>
                </select>
            </div>

            <div class="form-group">
                <label>威力</label>
                <input id="movePower"
                       type="number"
                       value="90">
            </div>

        </div>

    </section>

    <!-- 補正 -->
    <section class="card">

        <h2>補正</h2>

        <div class="checkboxes">

            <label>
                <input id="stab"
                       type="checkbox"
                       checked>
                タイプ一致
            </label>

            <label>
                <input id="critical"
                       type="checkbox">
                急所
            </label>

            <label>
                <input id="burn"
                       type="checkbox">
                やけど
            </label>

        </div>

        <div class="form-group">
            <label>天候</label>

            <select id="weather">

                <option value="none">なし</option>

                <option value="sun">
                    晴れ
                </option>

                <option value="rain">
                    雨
                </option>

            </select>
        </div>

    </section>

    <button id="calculateButton">
        ダメージ計算
    </button>

    <section class="card result">

        <h2>計算結果</h2>

        <div id="result">
            ダメージを計算してください。
        </div>

    </section>

</main>

<datalist id="pokemonList"></datalist>
<datalist id="moveList"></datalist>

<script type="module" src="js/app.js"></script>

</body>
</html>
