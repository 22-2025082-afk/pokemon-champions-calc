<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Champions ダメージ計算機 Ver.1.0</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>Pokémon Champions ダメージ計算機</h1>
    <p>Version 1.0</p>
</header>

<main class="container">

    <!-- ===================== -->
    <!-- 攻撃側 -->
    <!-- ===================== -->

    <section class="card">

        <h2>攻撃側</h2>

        <div class="form-group">
            <label for="attackerPokemon">ポケモン</label>
            <input
                id="attackerPokemon"
                list="pokemonList"
                autocomplete="off"
                placeholder="ポケモン名">
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>タイプ1</label>
                <select id="attackerType1"></select>
            </div>

            <div class="form-group">
                <label>タイプ2</label>
                <select id="attackerType2"></select>
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>HP</label>
                <input id="attackerBaseHP" type="number">
            </div>

            <div class="form-group">
                <label>攻撃</label>
                <input id="attackerBaseAtk" type="number">
            </div>

            <div class="form-group">
                <label>防御</label>
                <input id="attackerBaseDef" type="number">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>特攻</label>
                <input id="attackerBaseSpa" type="number">
            </div>

            <div class="form-group">
                <label>特防</label>
                <input id="attackerBaseSpd" type="number">
            </div>

            <div class="form-group">
                <label>素早さ</label>
                <input id="attackerBaseSpe" type="number">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>HP能力ポイント</label>
                <input id="attackerHPPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>攻撃能力ポイント</label>
                <input id="attackerAtkPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>防御能力ポイント</label>
                <input id="attackerDefPoint" type="number" value="0">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>特攻能力ポイント</label>
                <input id="attackerSpaPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>特防能力ポイント</label>
                <input id="attackerSpdPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>素早さ能力ポイント</label>
                <input id="attackerSpePoint" type="number" value="0">
            </div>

        </div>

        <div class="form-group">
            <label>性格</label>
            <select id="attackerNature"></select>
        </div>

        <div class="stats-box">

            <h3>実数値</h3>

            <div id="attackerStats">
                -
            </div>

        </div>

    </section>

    <!-- 防御側はPart2 -->  
    
    <!-- ===================== -->
    <!-- 防御側 -->
    <!-- ===================== -->

    <section class="card">

        <h2>防御側</h2>

        <div class="form-group">
            <label for="defenderPokemon">ポケモン</label>
            <input
                id="defenderPokemon"
                list="pokemonList"
                autocomplete="off"
                placeholder="ポケモン名">
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>タイプ1</label>
                <select id="defenderType1"></select>
            </div>

            <div class="form-group">
                <label>タイプ2</label>
                <select id="defenderType2"></select>
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>HP</label>
                <input id="defenderBaseHP" type="number">
            </div>

            <div class="form-group">
                <label>攻撃</label>
                <input id="defenderBaseAtk" type="number">
            </div>

            <div class="form-group">
                <label>防御</label>
                <input id="defenderBaseDef" type="number">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>特攻</label>
                <input id="defenderBaseSpa" type="number">
            </div>

            <div class="form-group">
                <label>特防</label>
                <input id="defenderBaseSpd" type="number">
            </div>

            <div class="form-group">
                <label>素早さ</label>
                <input id="defenderBaseSpe" type="number">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>HP能力ポイント</label>
                <input id="defenderHPPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>攻撃能力ポイント</label>
                <input id="defenderAtkPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>防御能力ポイント</label>
                <input id="defenderDefPoint" type="number" value="0">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>特攻能力ポイント</label>
                <input id="defenderSpaPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>特防能力ポイント</label>
                <input id="defenderSpdPoint" type="number" value="0">
            </div>

            <div class="form-group">
                <label>素早さ能力ポイント</label>
                <input id="defenderSpePoint" type="number" value="0">
            </div>

        </div>

        <div class="form-group">
            <label>性格</label>
            <select id="defenderNature"></select>
        </div>

        <div class="stats-box">

            <h3>実数値</h3>

            <div id="defenderStats">
                -
            </div>

        </div>

    </section>

    <!-- ===================== -->
    <!-- 技 -->
    <!-- ===================== -->

    <section class="card">

        <h2>技</h2>

        <div class="form-group">

            <label>技名</label>

            <input
                id="moveName"
                list="moveList"
                autocomplete="off"
                placeholder="技名">

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>タイプ</label>
                <select id="moveType"></select>
            </div>

            <div class="form-group">
                <label>分類</label>
                <select id="moveCategory">
                    <option value="physical">物理</option>
                    <option value="special">特殊</option>
                </select>
            </div>

            <div class="form-group">
                <label>威力</label>
                <input
                    id="movePower"
                    type="number"
                    value="90">
            </div>

        </div>

    </section>

    <!-- 補正はPart3 -->

    <!-- ===================== -->
    <!-- 補正 -->
    <!-- ===================== -->

    <section class="card">

        <h2>補正</h2>

        <div class="checkbox-grid">

            <label>
                <input id="stab" type="checkbox" checked>
                タイプ一致(STAB)
            </label>

            <label>
                <input id="critical" type="checkbox">
                急所
            </label>

            <label>
                <input id="burn" type="checkbox">
                やけど
            </label>

            <label>
                <input id="reflect" type="checkbox">
                リフレクター
            </label>

            <label>
                <input id="lightScreen" type="checkbox">
                ひかりのかべ
            </label>

        </div>

        <div class="form-row">

            <div class="form-group">

                <label>天候</label>

                <select id="weather">
                    <option value="none">なし</option>
                    <option value="sun">晴れ</option>
                    <option value="rain">雨</option>
                    <option value="sand">すなあらし</option>
                    <option value="snow">ゆき</option>
                </select>

            </div>

            <div class="form-group">

                <label>フィールド</label>

                <select id="field">
                    <option value="none">なし</option>
                    <option value="electric">エレキフィールド</option>
                    <option value="grassy">グラスフィールド</option>
                    <option value="misty">ミストフィールド</option>
                    <option value="psychic">サイコフィールド</option>
                </select>

            </div>

        </div>

    </section>

    <!-- ===================== -->
    <!-- 結果 -->
    <!-- ===================== -->

    <section class="card result-card">

        <h2>ダメージ計算結果</h2>

        <button id="calculateButton">
            ダメージ計算
        </button>

        <div class="result-box">

            <div id="damageResult">
                -
            </div>

            <div id="damagePercent">
                -
            </div>

            <div id="koChance">
                -
            </div>

        </div>

    </section>

</main>

<datalist id="pokemonList"></datalist>
<datalist id="moveList"></datalist>

<script type="module" src="js/app.js"></script>

</body>
</html>
